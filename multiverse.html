<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi C-137</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050816;
    color:white;
    overflow:hidden;
}

.portal{
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#52ff8f 0%,#00ffcc33 40%,transparent 70%);
    border-radius:50%;
    filter:blur(20px);
    animation:spin 10s linear infinite;
    top:-200px;
    right:-200px;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.container{
    position:relative;
    z-index:2;
    max-width:420px;
    margin:auto;
    margin-top:60px;
    background:#10182cdd;
    border:2px solid #42ff87;
    border-radius:25px;
    padding:25px;
    box-shadow:0 0 30px #42ff87aa;
}

h1{
    text-align:center;
    color:#52ff8f;
    font-size:34px;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    opacity:0.7;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:15px;
    background:#1c2742;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#42ff87;
    color:black;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.result{
    margin-top:25px;
    background:#0d1325;
    border-radius:20px;
    padding:20px;
    display:none;
    animation:fade 0.5s;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.dimension{
    color:#52ff8f;
    font-size:26px;
    margin-bottom:10px;
}

.randomText{
    opacity:0.85;
    line-height:1.5;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    opacity:0.4;
}
</style>
</head>

<body>

<div class="portal"></div>

<div class="container">

<h1>FLASHTAXI C-137</h1>
<div class="sub">
Interdimensional Transport System
</div>

<input type="text" id="from" placeholder="Iš kur paimti keleivį">
<input type="text" id="to" placeholder="Kur keliauti">

<button onclick="orderTaxi()">
OPEN TRANSPORT PORTAL
</button>

<div class="result" id="result">
    <div class="dimension" id="dimension"></div>
    <div class="randomText" id="randomText"></div>
</div>

<div class="footer">
FlashTaxi Multiverse Network v9.42
</div>

</div>

<script>

const texts = [
"Vairuotojas teleportuojamas iš paralelinės dimensijos...",
"Jūsų vairuotojas kovoja su kosminėmis gyvatėmis...",
"Portal stabilizuojamas...",
"Kelionė patvirtinta Galactic Senate...",
"Rick approved transport sequence detected...",
"Perspėjimas: keleivis gali patekti į alternatyvią realybę.",
"Quantum taxi engine įjungtas...",
"Surastas vairuotojas su 5 žvaigždutėmis visose dimensijose.",
"Morty netyčia paspaudė ne tą mygtuką...",
"Portal fuel level: unstable."
];

function orderTaxi(){

    const dim = "DIMENSION C-" + Math.floor(Math.random()*999);

    const random = texts[Math.floor(Math.random()*texts.length)];

    document.getElementById("result").style.display = "block";

    document.getElementById("dimension").innerHTML = dim;

    document.getElementById("randomText").innerHTML = random;
}

</script>

</body>
</html>

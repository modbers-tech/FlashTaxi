<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashTaxi Garage</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050816;
    color:white;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(to bottom,#07111f,#02040b);
}

.container{
    position:relative;
    z-index:2;
    display:flex;
    height:100vh;
}

.sidebar{
    width:280px;
    background:#0b1224;
    border-right:2px solid #32ff8c;
    padding:20px;
    overflow:auto;
}

.sidebar h2{
    color:#32ff8c;
}

.partBtn{
    width:100%;
    margin-bottom:10px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#15213d;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

.partBtn:hover{
    background:#32ff8c;
    color:black;
}

.garage{
    flex:1;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.carArea{
    position:relative;
    width:700px;
    height:500px;
}

.carBase{
    position:absolute;
    bottom:80px;
    left:150px;
    width:400px;
    height:120px;
    background:#ffd000;
    border-radius:40px 40px 25px 25px;
    box-shadow:0 0 30px #ffd00066;
}

.roof{
    position:absolute;
    bottom:170px;
    left:240px;
    width:220px;
    height:80px;
    background:#ffd000;
    border-radius:30px 30px 10px 10px;
    display:none;
}

.taxiSign{
    position:absolute;
    bottom:255px;
    left:315px;
    width:80px;
    text-align:center;
</html>

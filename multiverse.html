<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashTaxi Garage</title>

<style>

body{
    margin:0;
    background:#050816;
    font-family:Arial;
    color:white;
}

.menu{
    position:fixed;
    left:0;
    top:0;
    width:220px;
    height:100%;
    background:#10182c;
    padding:20px;
}

button{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    background:#32ff8c;
    font-size:16px;
    cursor:pointer;
}

.garage{
    margin-left:240px;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.car{
    position:relative;
    width:500px;
    height:300px;
}

.base{
    position:absolute;
    bottom:60px;
    left:60px;
    width:380px;
    height:100px;
    background:gold;
    border-radius:30px;
}

.roof{
    position:absolute;
    bottom:140px;
    left:140px;
    width:200px;
    height:70px;
    background:gold;
    border-radius:20px;
    display:none;
}

.sign{
    position:absolute;
    bottom:220px;
    left:210px;
    background:black;
    color:yellow;
    padding:8px;
    border-radius:10px;
    display:none;
}

.engine1{
    position:absolute;
    left:10px;
    bottom:90px;
    width:40px;
    height:40px;
    background:cyan;
    border-radius:50%;
    box-shadow:0 0 20px cyan;
    display:none;
}

.engine2{
    position:absolute;
    right:10px;
    bottom:90px;
    width:40px;
    height:40px;
    background:cyan;
    border-radius:50%;
    box-shadow:0 0 20px cyan;
    display:none;
}

.portal{
    position:absolute;
    right:-100px;
    top:20px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:purple;
    box-shadow:0 0 30px purple;
    display:none;
}

</style>
</head>

<body>

<div class="menu">

<h2>FLASH TAXI</h2>

<button onclick="toggle('roof')">
Stogas
</button>

<button onclick="toggle('sign')">
Taxi ženklas
</button>

<button onclick="engines()">
Varikliai
</button>

<button onclick="toggle('portal')">
Portalas
</button>

</div>

<div class="garage">

<div class="car">

<div class="portal" id="portal"></div>

<div class="roof" id="roof"></div>

<div class="sign" id="sign">
TAXI
</div>

<div class="engine1" id="engine1"></div>
<div class="engine2" id="engine2"></div>

<div class="base"></div>

</div>

</div>

<script>

function toggle(id){

let el=document.getElementById(id);

if(el.style.display=="block"){
    el.style.display="none";
}else{
    el.style.display="block";
}

}

function engines(){

let e1=document.getElementById("engine1");
let e2=document.getElementById("engine2");

if(e1.style.display=="block"){
    e1.style.display="none";
    e2.style.display="none";
}else{
    e1.style.display="block";
    e2.style.display="block";
}

}

</script>

</body>
</html>

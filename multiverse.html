# FlashTaxi C-137 su paveikslėliais

Įdėk šitą vietoj seno kodo 😄

```html
<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashTaxi C-137</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050816;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1502134249126-9f3755a50d78?q=80&w=1600&auto=format&fit=crop') center/cover;
    opacity:0.15;
    z-index:-2;
}

.portal{
    position:fixed;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#52ff8f 0%,#00ffcc33 40%,transparent 70%);
    border-radius:50%;
    filter:blur(20px);
    animation:spin 10s linear infinite;
    top:-200px;
    right:-200px;
}

@keyframes spin{
    from{transform:rotate(0deg);} 
    to{transform:rotate(360deg);} 
}

.container{
    position:relative;
    z-index:2;
    max-width:430px;
    margin:auto;
    margin-top:30px;
    background:#10182cdd;
    border:2px solid #42ff87;
    border-radius:25px;
    padding:25px;
    box-shadow:0 0 30px #42ff87aa;
}

.logo{
    width:100%;
    border-radius:20px;
    margin-bottom:15px;
    border:2px solid #42ff87;
}

.car{
    width:100%;
    border-radius:20px;
    margin-top:20px;
    opacity:0.9;
}

h1{
    text-align:center;
    color:#52ff8f;
    font-size:34px;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    opacity:0.7;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:15px;
    background:#1c2742;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#42ff87;
    color:black;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:25px;
    background:#0d1325;
    border-radius:20px;
    padding:20px;
    display:none;
}

.dimension{
    color:#52ff8f;
    font-size:26px;
    margin-bottom:10px;
}

.randomText{
    opacity:0.85;
    line-height:1.5;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    opacity:0.4;
}
</style>
</head>

<body>

<div class="portal"></div>

<div class="container">

<img class="logo" src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1200&auto=format&fit=crop">

<h1>FLASHTAXI C-137</h1>
<div class="sub">
Interdimensional Transport System
</div>

<input type="text" id="from" placeholder="Iš kur paimti keleivį">
<input type="text" id="to" placeholder="Kur keliauti">

<button onclick="orderTaxi()">
OPEN TRANSPORT PORTAL
</button>

<div class="result" id="result">
    <div class="dimension" id="dimension"></div>
    <div class="randomText" id="randomText"></div>
</div>

<img class="car" src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1400&auto=format&fit=crop">

<div class="footer">
FlashTaxi Multiverse Network v9.42
</div>

</div>

<script>

const texts = [
"Vairuotojas teleportuojamas iš paralelinės dimensijos...",
"Portal stabilizuojamas...",
"Quantum taxi engine įjungtas...",
"Morty netyčia paspaudė ne tą mygtuką...",
"Surastas vairuotojas visose dimensijose.",
"Kelionė patvirtinta Galactic Senate..."
];

function orderTaxi(){

    const dim = "DIMENSION C-" + Math.floor(Math.random()*999);

    const random = texts[Math.floor(Math.random()*texts.length)];

    document.getElementById("result").style.display = "block";

    document.getElementById("dimension").innerHTML = dim;

    document.getElementById("randomText").innerHTML = random;
}

</script>

</body>
</html>
```

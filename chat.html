<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashTaxi Chat</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      height: 100vh;
      display: flex;
    }

    /* KAIRE PUSE */

    .sidebar {
      width: 260px;
      background: #181818;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      background: #ffd000;
      color: black;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    .chat-list {
      padding: 10px;
      overflow-y: auto;
      flex: 1;
    }

    .chat-item {
      background: #222;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .chat-item:hover {
      background: #2d2d2d;
    }

    .chat-item-name {
      color: #ffd000;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .chat-item-last {
      color: #aaa;
      font-size: 14px;
    }

    /* DESINE PUSE */

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #ffd000;
      color: black;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 15px;
      word-wrap: break-word;
      max-width: 75%;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .username {
      font-size: 13px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .time {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.7;
    }

    #nameInput {
      width: 140px;
      margin: 10px;
      padding: 8px 10px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: #2d2d2d;
      color: white;
    }

    .bottom {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #messageInput {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ffd000;
      font-weight: bold;
      cursor: pointer;
    }

    @media(max-width: 800px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="sidebar">

  <div class="sidebar-header">
    Pokalbiai
  </div>

  <div class="chat-list">
    <div class="chat-item">
      <div class="chat-item-name">
        FlashTaxi Global Chat
      </div>

      <div class="chat-item-last">
        Realaus laiko pokalbiai
      </div>
    </div>
  </div>

</div>

<div class="chat-area">

  <div class="header">
    ⚡ FlashTaxi Chat
  </div>

  <div id="messages"></div>

  <input type="text" id="nameInput" placeholder="Tavo vardas...">

  <div class="bottom">
    <input type="text" id="messageInput" placeholder="Rašyti žinutę...">
    <button onclick="sendMessage()">Siųsti</button>
  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC564evMK0zTR2xzth9qWuRweNf99Zu3sw",
  authDomain: "flashtaxi-a913f.firebaseapp.com",
  projectId: "flashtaxi-a913f",
  storageBucket: "flashtaxi-a913f.firebasestorage.app",
  messagingSenderId: "73024715827",
  appId: "1:73024715827:web:efe775ddd74365bcc47746"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const messagesDiv = document.getElementById('messages');

function sendMessage() {

  const input = document.getElementById('messageInput');
  const nameInput = document.getElementById('nameInput');

  const text = input.value.trim();

  if(text === '') return;

  const name = nameInput.value.trim() || 'Vartotojas';

  db.collection('messages').add({
    name: name,
    text: text,
    time: Date.now()
  });

  input.value = '';
}

db.collection('messages')
.orderBy('time')
.onSnapshot(snapshot => {

  messagesDiv.innerHTML = '';

  snapshot.forEach(doc => {

    const data = doc.data();

    const msg = document.createElement('div');

    msg.className = 'msg';

    const currentUser =
      document.getElementById('nameInput').value || 'Vartotojas';

    const isMine =
      (data.name || 'Vartotojas') === currentUser;

    if(isMine) {
      msg.style.alignSelf = 'flex-end';
      msg.style.background = '#ffd000';
      msg.style.color = 'black';
    } else {
      msg.style.alignSelf = 'flex-start';
      msg.style.background = '#2d2d2d';
      msg.style.color = 'white';
    }

    const date = new Date(data.time);

    const time =
      date.getHours().toString().padStart(2, '0') +
      ':' +
      date.getMinutes().toString().padStart(2, '0');

    msg.innerHTML = `
      <div class="username" style="color:${isMine ? '#000' : '#ffd000'}">
        ${(data.name || 'Vartotojas')}
      </div>

      <div>
        ${data.text}
      </div>

      <div class="time">
        ${time}
      </div>
    `;

    messagesDiv.appendChild(msg);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

</script>

</body>
</html>

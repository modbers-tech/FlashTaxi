<!DOCTYPE html>
<html lang="lt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi Chat</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
height:100dvh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
min-width:260px;
background:#181818;
border-right:1px solid #333;
display:flex;
flex-direction:column;
}

.sidebar-header{
background:#ffd000;
color:black;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.chat-list{
padding:10px;
overflow-y:auto;
}

.chat-item{
background:#222;
padding:14px;
border-radius:14px;
}

.chat-item-name{
color:#ffd000;
font-weight:bold;
margin-bottom:5px;
font-size:18px;
}

.chat-item-last{
color:#aaa;
font-size:14px;
}

/* ONLINE */

#onlineBox{
margin-top:15px;
padding:12px;
border:1px solid #00ff66;
border-radius:14px;
background:rgba(0,255,100,0.05);
}

#onlineTitle{
color:#00ff66;
font-weight:bold;
margin-bottom:10px;
}

#onlineUsers{
display:flex;
flex-direction:column;
gap:8px;
}

.onlineUser{
padding:6px 10px;
border-radius:10px;
background:rgba(0,255,100,0.08);
border:1px solid #00ff66;
color:#00ff66;
font-size:14px;
}

/* CHAT */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

.header{
position:relative;
background:#ffd000;
color:black;
padding:18px 18px 18px 90px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.back-btn{
position:absolute;
left:15px;
top:10px;
background:#000;
color:#ffd000;
text-decoration:none;
padding:10px 16px;
border-radius:12px;
font-size:15px;
font-weight:bold;
border:2px solid #ffd000;
}

/* SKINS */

.skin-bar{
display:flex;
gap:10px;
padding:10px;
background:#111;
border-bottom:1px solid #333;
justify-content:center;
}

.skin-btn{
background:#ffd000;
color:black;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
padding-bottom:120px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
padding:12px 14px;
border-radius:18px;
max-width:320px;
word-wrap:break-word;
}

.username{
font-size:13px;
font-weight:bold;
margin-bottom:6px;
}

.time{
margin-top:7px;
font-size:11px;
opacity:0.7;
}

/* NAME */

.name-bar{
display:flex;
align-items:center;
justify-content:space-between;
width:170px;
margin-left:auto;
margin-right:10px;
margin-top:8px;
margin-bottom:8px;
padding:6px 8px;
background:#1b1b1b;
border:1px solid #333;
border-radius:12px;
}

#savedName{
font-size:13px;
font-weight:bold;
color:#bbb;
}

.edit-btn{
background:#2a2a2a;
color:#ffd000;
border:none;
border-radius:8px;
padding:5px 8px;
cursor:pointer;
}

/* INPUT */

.bottom{
display:flex;
padding:10px;
background:#222;
gap:10px;
}

#messageInput{
flex:1;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
}

.send-btn{
padding:14px 20px;
border:none;
border-radius:12px;
background:#ffd000;
font-weight:bold;
cursor:pointer;
}

/* IRC */

body.irc{
background:black;
font-family:Consolas,monospace;
}

body.irc .sidebar{
background:#000;
border-right:1px solid #00ff00;
}

body.irc .sidebar-header{
background:#001100;
color:#00ff00;
}

body.irc .chat-item{
background:#001100;
}

body.irc .chat-item-name{
color:#00ff00;
}

body.irc .chat-item-last{
color:#00cc00;
}

body.irc .header{
background:#001100;
color:#00ff00;
}

body.irc .back-btn{
background:black;
color:#00ff00;
border:1px solid #00ff00;
}

body.irc .skin-bar{
background:#000;
border-bottom:1px solid #00ff00;
}

body.irc .skin-btn{
background:#001100;
color:#00ff00;
border:1px solid #00ff00;
}

body.irc .msg{
background:#001100 !important;
color:#00ff00 !important;
border-radius:0;
border-left:3px solid #00ff00;
}

body.irc .username{
color:#00ff00 !important;
}

body.irc .bottom{
background:#000;
border-top:1px solid #00ff00;
}

body.irc #messageInput{
background:black;
color:#00ff00;
border:1px solid #00ff00;
}

body.irc .send-btn{
background:#001100;
color:#00ff00;
border:1px solid #00ff00;
}

/* MOBILE */

@media(max-width:800px){

body{
flex-direction:column;
overflow-x:hidden;
}

.sidebar{
width:100%;
min-width:100%;
max-height:180px;
border-right:none;
border-bottom:1px solid #333;
overflow-y:auto;
}

.chat-area{
width:100%;
height:100dvh;
}

.header{
font-size:20px;
padding-top:60px;
padding-bottom:14px;
padding-left:20px;
padding-right:20px;
}

.back-btn{
left:10px;
top:10px;
padding:8px 10px;
font-size:12px;
}

#onlineUsers{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.onlineUser{
font-size:12px;
padding:5px 8px;
white-space:nowrap;
}

.msg{
max-width:88%;
font-size:15px;
}

#messages{
padding:12px;
padding-bottom:100px;
}

.name-bar{
width:92%;
margin:auto;
margin-top:5px;
margin-bottom:5px;
}

#messageInput{
font-size:16px;
height:52px;
}

.send-btn{
font-size:14px;
padding:12px 14px;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="sidebar-header">
Pokalbiai
</div>

<div class="chat-list">

<div class="chat-item">

<div class="chat-item-name">
FlashTaxi Global Chat
</div>

<div class="chat-item-last">
Realaus laiko pokalbiai
</div>

<div id="onlineBox">

<div id="onlineTitle">
🟢 ONLINE
</div>

<div id="onlineUsers">
Loading...
</div>

</div>

</div>

</div>

</div>

<div class="chat-area">

<div class="header">

<a href="index.html" class="back-btn">
⬅ Pagrindinis
</a>

⚡ FlashTaxi Chat

</div>

<div class="skin-bar">

<button class="skin-btn" onclick="setModern()">
☀ Modern
</button>

<button class="skin-btn" onclick="setIRC()">
💻 IRC
</button>

</div>

<div id="messages"></div>

<div class="name-bar">

<div id="savedName">
Vartotojas
</div>

<button class="edit-btn" onclick="changeName()">
✏️
</button>

</div>

<div class="bottom">

<input
type="text"
id="messageInput"
placeholder="Rašyti žinutę..."
>

<button
class="send-btn"
onclick="sendMessage()"
>
Siųsti
</button>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyC564evMK0zTR2xzth9qWuRweNf99Zu3sw",
authDomain: "flashtaxi-a913f.firebaseapp.com",
projectId: "flashtaxi-a913f",
storageBucket: "flashtaxi-a913f.firebasestorage.app",
messagingSenderId: "73024715827",
appId: "1:73024715827:web:efe775ddd74365bcc47746"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const database = firebase.database();

const messagesDiv =
document.getElementById('messages');

let userName =
localStorage.getItem('flashTaxiName')
|| 'Vartotojas';

document.getElementById(
'savedName'
).innerText = userName;

function changeName(){

const newName =
prompt('Įvesk vardą:', userName);

if(newName && newName.trim() !== ''){

userName = newName.trim();

localStorage.setItem(
'flashTaxiName',
userName
);

document.getElementById(
'savedName'
).innerText = userName;

}

}

function sendMessage(){

const input =
document.getElementById('messageInput');

const text = input.value.trim();

if(text === '') return;

db.collection('messages').add({

name:userName,
text:text,
time:Date.now()

});

input.value='';

}

document
.getElementById('messageInput')
.addEventListener('keypress', function(e){

if(e.key === 'Enter'){

sendMessage();

}

});
});

function formatMessage(text){
  
const urlRegex = /(https?:\/\/[^\s]+)/g;

return text.replace(urlRegex,function(url){

return `

<a
href="${url}"
target="_blank"
style="
color:#00aaff;
font-weight:bold;
text-decoration:underline;
word-break:break-all;
"
>

${url}
</a>
`;

});

}

db.collection('messages')
.orderBy('time')
.onSnapshot(snapshot => {

messagesDiv.innerHTML='';

snapshot.forEach(doc => {

const data = doc.data();

const msg =
document.createElement('div');

msg.className='msg';

const isMine =
(data.name || 'Vartotojas')
=== userName;

if(isMine){

msg.style.alignSelf='flex-end';

if(!document.body.classList.contains('irc')){
msg.style.background='#ffd000';
msg.style.color='black';
}

}else{

msg.style.alignSelf='flex-start';

if(!document.body.classList.contains('irc')){
msg.style.background='#2d2d2d';
msg.style.color='white';
}

}

const date = new Date(data.time);

const time =

date.getHours()
.toString()
.padStart(2,'0')

+ ':'
+

date.getMinutes()
.toString()
.padStart(2,'0');

msg.innerHTML = `

<div
class="username"
style="color:${isMine ? '#000' : '#ffd000'}"
>

${data.name || 'Vartotojas'}

</div>

<div>

${formatMessage(data.text)}

</div>

<div class="time">

${time}

</div>

`;

messagesDiv.appendChild(msg);

});

messagesDiv.scrollTop =
messagesDiv.scrollHeight;

});

/* ONLINE */

const userId =
"user_" +
Math.random().toString(36).substr(2,9);

const userRef =
database.ref(
"online/" + userId
);

userRef.set({

name:userName,
online:true,
time:Date.now()

});

userRef.onDisconnect().remove();

database.ref("online")
.on("value",(snapshot)=>{

const data =
snapshot.val();

let html = "";

if(data){

for(let id in data){

html +=
'<div class="onlineUser">🟢 ' +
data[id].name +
'</div>';

}

}else{

html = "Niekas online";

}

document.getElementById(
"onlineUsers"
).innerHTML = html;

});

function setIRC(){

document.body.classList.add('irc');

localStorage.setItem(
'flashTaxiSkin',
'irc'
);

}

function setModern(){

document.body.classList.remove('irc');

localStorage.setItem(
'flashTaxiSkin',
'modern'
);

}

const savedSkin =
localStorage.getItem('flashTaxiSkin');

if(savedSkin === 'irc'){

document.body.classList.add('irc');

}

</script>

</body>
</html>

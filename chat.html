<!DOCTYPE html>

<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashTaxi Chat</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 95%;
      max-width: 500px;
      height: 90vh;
      background: #1b1b1b;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .header {
      background: #ffd000;
      color: black;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      background: #2d2d2d;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
      word-wrap: break-word;
    }

    .bottom {
      display: flex;
      padding: 10px;
      background: #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ffd000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>

</head>
<body>

<div class="chat-box">
  <div class="header">⚡ FlashTaxi Chat</div>

  <div id="messages"></div>

  <div style="padding:10px; background:#1b1b1b; border-top:1px solid #333;">
    <input type="text" id="nameInput" placeholder="Tavo vardas..." style="width:100%; margin-bottom:10px; padding:12px; border:none; border-radius:10px; outline:none; font-size:16px;">
  </div>

  <div class="bottom">
    <input type="text" id="messageInput" placeholder="Rašyti žinutę...">
    <button onclick="sendMessage()">Siųsti</button>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC564evMK0zTR2xzth9qWuRweNf99Zu3sw",
  authDomain: "flashtaxi-a913f.firebaseapp.com",
  projectId: "flashtaxi-a913f",
  storageBucket: "flashtaxi-a913f.firebasestorage.app",
  messagingSenderId: "73024715827",
  appId: "1:73024715827:web:efe775ddd74365bcc47746"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const messagesDiv = document.getElementById('messages');

function sendMessage() {

  const input = document.getElementById('messageInput');

  const text = input.value.trim();

  if(text === '') return;

  const name = document.getElementById('nameInput').value.trim() || 'Anonimas';

  db.collection('messages').add({
    name: name,
    text: text,
    time: Date.now()
  });

  input.value = '';
}

// REAL TIME CHAT

db.collection('messages')
.orderBy('time')
.onSnapshot(snapshot => {

  messagesDiv.innerHTML = '';

  snapshot.forEach(doc => {

    const msg = document.createElement('div');

    msg.className = 'msg';

    msg.innerHTML = '<b>' + doc.data().name + ':</b> ' + doc.data().text;

    messagesDiv.appendChild(msg);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="lt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi Chat</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* KAIRE */

.sidebar{
width:260px;
background:#181818;
border-right:1px solid #333;
display:flex;
flex-direction:column;
}

.sidebar-header{
background:#ffd000;
color:black;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.chat-list{
padding:10px;
overflow-y:auto;
}

.chat-item{
background:#222;
padding:14px;
border-radius:14px;
cursor:pointer;
transition:0.2s;
}

.chat-item:hover{
background:#2d2d2d;
}

.chat-item-name{
color:#ffd000;
font-weight:bold;
margin-bottom:5px;
font-size:18px;
}

.chat-item-last{
color:#aaa;
font-size:14px;
}

/* DESINE */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#ffd000;
color:black;
padding:18px;
font-size:28px;
font-weight:bold;
text-align:center;
}

/* ZINUTES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
padding:12px 14px;
border-radius:18px;
max-width:320px;
min-width:90px;
word-wrap:break-word;
box-shadow:0 0 10px rgba(0,0,0,0.35);
animation:show 0.15s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.username{
font-size:13px;
font-weight:bold;
margin-bottom:6px;
}

.time{
margin-top:7px;
font-size:11px;
opacity:0.7;
}

/* VARDO BLOKAS */

.name-bar{
display:flex;
align-items:center;
justify-content:space-between;

width:170px;

margin-left:auto;
margin-right:10px;
margin-top:8px;
margin-bottom:8px;

padding:6px 8px;

background:#1b1b1b;

border:1px solid #333;

border-radius:12px;
}

#savedName{
font-size:13px;
font-weight:bold;
color:#bbb;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:110px;
}

.edit-btn{
background:#2a2a2a;
color:#ffd000;
border:none;
border-radius:8px;
padding:5px 8px;
cursor:pointer;
font-size:12px;
transition:0.2s;
}

.edit-btn:hover{
background:#3a3a3a;
}

/* APACIA */

.bottom{
display:flex;
padding:10px;
background:#222;
gap:10px;
}

#messageInput{
flex:1;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
}

.send-btn{
padding:14px 20px;
border:none;
border-radius:12px;
background:#ffd000;
font-weight:bold;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.send-btn:hover{
opacity:0.9;
}

/* MOBILE */

@media(max-width:800px){

.sidebar{
display:none;
}

.msg{
max-width:75%;
}

.header{
font-size:24px;
}

}

</style>
</head>

<body>

<!-- KAIRE -->

<div class="sidebar">

<div class="sidebar-header">
Pokalbiai
</div>

<div class="chat-list">

<div class="chat-item">

<div class="chat-item-name">
FlashTaxi Global Chat
</div>

<div class="chat-item-last">
Realaus laiko pokalbiai
</div>

</div>

</div>

</div>

<!-- DESINE -->

<div class="chat-area">

<div class="header">
⚡ FlashTaxi Chat
</div>

<div id="messages"></div>

<!-- VARDO JUOSTA -->

<div class="name-bar">

<div id="savedName">
Vartotojas
</div>

<button class="edit-btn" onclick="changeName()">
✏️
</button>

</div>

<!-- APATINE -->

<div class="bottom">

<input
type="text"
id="messageInput"
placeholder="Rašyti žinutę..."
>

<button
class="send-btn"
onclick="sendMessage()"
>
Siųsti
</button>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyC564evMK0zTR2xzth9qWuRweNf99Zu3sw",

authDomain: "flashtaxi-a913f.firebaseapp.com",

projectId: "flashtaxi-a913f",

storageBucket: "flashtaxi-a913f.firebasestorage.app",

messagingSenderId: "73024715827",

appId: "1:73024715827:web:efe775ddd74365bcc47746"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const messagesDiv =
document.getElementById('messages');

/* VARDAS */

let userName =
localStorage.getItem('flashTaxiName')
|| 'Vartotojas';

document.getElementById(
'savedName'
).innerText = userName;

function changeName(){

const newName =
prompt('Įvesk vardą:', userName);

if(newName && newName.trim() !== ''){

userName = newName.trim();

localStorage.setItem(
'flashTaxiName',
userName
);

document.getElementById(
'savedName'
).innerText = userName;

}

}

/* SIUNTIMAS */

function sendMessage(){

const input =
document.getElementById('messageInput');

const text = input.value.trim();

if(text === '') return;

db.collection('messages').add({

name:userName,

text:text,

time:Date.now()

});

input.value='';

}

/* ENTER */

document
.getElementById('messageInput')
.addEventListener('keypress', function(e){

if(e.key === 'Enter'){

sendMessage();

}

});

/* REALTIME CHAT */

db.collection('messages')

.orderBy('time')

.onSnapshot(snapshot => {

messagesDiv.innerHTML='';

snapshot.forEach(doc => {

const data = doc.data();

const msg =
document.createElement('div');

msg.className='msg';

const isMine =
(data.name || 'Vartotojas')
=== userName;

if(isMine){

msg.style.alignSelf='flex-end';
msg.style.background='#ffd000';
msg.style.color='black';

}else{

msg.style.alignSelf='flex-start';
msg.style.background='#2d2d2d';
msg.style.color='white';

}

const date = new Date(data.time);

const time =

date.getHours()
.toString()
.padStart(2,'0')

+

':'

+

date.getMinutes()
.toString()
.padStart(2,'0');

msg.innerHTML = `

<div
class="username"
style="color:${isMine ? '#000' : '#ffd000'}"
>

${data.name || 'Vartotojas'}

</div>

<div>

${data.text}

</div>

<div class="time">

${time}

</div>

`;

messagesDiv.appendChild(msg);

});

messagesDiv.scrollTop =
messagesDiv.scrollHeight;

});

</script>

</body>
</html>

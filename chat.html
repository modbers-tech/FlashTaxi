<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashTaxi Chat</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-box {
      width: 95%;
      max-width: 500px;
      height: 90vh;
      background: #1b1b1b;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .header {
      background: #ffd000;
      color: black;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 15px;
      word-wrap: break-word;
      max-width: 75%;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .bottom {
      display: flex;
      padding: 10px;
      background: #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ffd000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #nameInput {
      width: calc(100% - 20px);
      margin: 10px;
      box-sizing: border-box;
    }

    .username {
      font-size: 13px;
      margin-bottom: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="chat-box">

  <div class="header">
    ⚡ FlashTaxi Chat
  </div>

  <div id="messages"></div>

  <input type="text" id="nameInput" placeholder="Tavo vardas...">

  <div class="bottom">
    <input type="text" id="messageInput" placeholder="Rašyti žinutę...">
    <button onclick="sendMessage()">Siųsti</button>
  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC564evMK0zTR2xzth9qWuRweNf99Zu3sw",
  authDomain: "flashtaxi-a913f.firebaseapp.com",
  projectId: "flashtaxi-a913f",
  storageBucket: "flashtaxi-a913f.firebasestorage.app",
  messagingSenderId: "73024715827",
  appId: "1:73024715827:web:efe775ddd74365bcc47746"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const messagesDiv = document.getElementById('messages');

function sendMessage() {

  const input = document.getElementById('messageInput');
  const nameInput = document.getElementById('nameInput');

  const text = input.value.trim();

  if(text === '') return;

  const name = nameInput.value.trim() || 'Vartotojas';

  db.collection('messages').add({
    name: name,
    text: text,
    time: Date.now()
  });

  input.value = '';
}

db.collection('messages')
.orderBy('time')
.onSnapshot(snapshot => {

  messagesDiv.innerHTML = '';

  snapshot.forEach(doc => {

    const data = doc.data();

    const msg = document.createElement('div');

    msg.className = 'msg';

    const currentUser =
      document.getElementById('nameInput').value || 'Vartotojas';

    const isMine =
      (data.name || 'Vartotojas') === currentUser;

    if(isMine) {
      msg.style.alignSelf = 'flex-end';
      msg.style.background = '#ffd000';
      msg.style.color = 'black';
    } else {
      msg.style.alignSelf = 'flex-start';
      msg.style.background = '#2d2d2d';
      msg.style.color = 'white';
    }

    msg.innerHTML = `
      <div class="username" style="color:${isMine ? '#000' : '#ffd000'}">
        ${(data.name || 'Vartotojas')}
      </div>

      <div>
        ${data.text}
      </div>
    `;

    messagesDiv.appendChild(msg);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

</script>

</body>
</html>

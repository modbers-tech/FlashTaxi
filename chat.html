<!DOCTYPE html>
<html lang="lt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi Chat</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
height:100dvh;
display:flex;
flex-direction:row;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#181818;
border-right:1px solid #333;
display:flex;
flex-direction:column;
}

.sidebar-header{
background:#ffd000;
color:black;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.chat-list{
padding:10px;
overflow-y:auto;
}

.chat-item{
background:#222;
padding:14px;
border-radius:14px;
transition:0.2s;
}

.chat-item:hover{
background:#2d2d2d;
}

.chat-item-name{
color:#ffd000;
font-weight:bold;
margin-bottom:5px;
font-size:18px;
}

.chat-item-last{
color:#aaa;
font-size:14px;
}

/* ONLINE */

#onlineBox{
margin-top:15px;
padding:12px;
border:1px solid #00ff66;
border-radius:14px;
background:rgba(0,255,100,0.05);
box-shadow:0 0 10px rgba(0,255,100,0.2);
}

#onlineTitle{
color:#00ff66;
font-weight:bold;
margin-bottom:10px;
text-shadow:0 0 8px #00ff66;
}

#onlineUsers{
display:flex;
flex-direction:column;
gap:8px;
font-size:14px;
}

.onlineUser{
padding:6px 10px;
border-radius:10px;
background:rgba(0,255,100,0.08);
border:1px solid #00ff66;
color:#00ff66;
text-shadow:0 0 5px #00ff66;
}

/* CHAT */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

.header{
position:relative;
background:#ffd000;
color:black;
padding:18px 18px 18px 90px;
font-size:28px;
font-weight:bold;
text-align:center;
}

/* BACK */

.back-btn{
position:absolute;
left:15px;
top:10px;
background:#000;
color:#ffd000;
text-decoration:none;
padding:10px 16px;
border-radius:12px;
font-size:15px;
font-weight:bold;
border:2px solid #ffd000;
transition:0.2s;
}

.back-btn:hover{
background:#ffd000;
color:black;
}

/* SKINS */

.skin-bar{
display:flex;
gap:10px;
padding:10px;
background:#111;
border-bottom:1px solid #333;
justify-content:center;
}

.skin-btn{
background:#ffd000;
color:black;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
padding-bottom:120px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
padding:12px 14px;
border-radius:18px;
max-width:320px;
min-width:90px;
word-wrap:break-word;
box-shadow:0 0 10px rgba(0,0,0,0.35);
animation:show 0.15s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.username{
font-size:13px;
font-weight:bold;
margin-bottom:6px;
}

.time{
margin-top:7px;
font-size:11px;
opacity:0.7;
}

/* NAME */

.name-bar{
display:flex;
align-items:center;
justify-content:space-between;
width:170px;
margin-left:auto;
margin-right:10px;
margin-top:8px;
margin-bottom:8px;
padding:6px 8px;
background:#1b1b1b;
border:1px solid #333;
border-radius:12px;
}

#savedName{
font-size:13px;
font-weight:bold;
color:#bbb;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:110px;
}

.edit-btn{
background:#2a2a2a;
color:#ffd000;
border:none;
border-radius:8px;
padding:5px 8px;
cursor:pointer;
font-size:12px;
}

/* INPUT */

.bottom{
position:sticky;
bottom:0;
display:flex;
padding:10px;
background:#222;
gap:10px;
z-index:999;
}

#messageInput{
flex:1;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
background:white;
color:black;
}

.send-btn{
padding:14px 20px;
border:none;
border-radius:12px;
background:#ffd000;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

/* IRC */

body.irc{
background:black;
font-family:Consolas,monospace;
}

body.irc .sidebar{
background:#000;
border-right:1px solid #00ff00;
}

body.irc .sidebar-header{
background:#001100;
color:#00ff00;
}

body.irc .chat-item{
background:#001100;
}

body.irc .chat-item-name{
color:#00ff00;
}

body.irc .chat-item-last{
color:#00cc00;
}

body.irc .header{
background:#001100;
color:#00ff00;
}

body.irc .back-btn{
background:black;
color:#00ff00;
border:1px solid #00ff00;
}

body.irc .skin-bar{
background:#000;
border-bottom:1px solid #00ff00;
}

body.irc .skin-btn{
background:#001100;
color:#00ff00;
border:1px solid #00ff00;
}

body.irc .msg{
background:#001100 !important;
color:#00ff00 !important;
border-radius:0;
box-shadow:none;
border-left:3px solid #00ff00;
}

body.irc .username{
display:inline-block;
padding:2px 6px;
border:1px solid #00ff00;
background:#001100;
color:#00ff00 !important;
border-radius:4px;
margin-bottom:4px;
font-weight:bold;
}

body.irc .bottom{
background:#000;
border-top:1px solid #00ff00;
}

body.irc #messageInput{
background:black;
color:#00ff00;
border:1px solid #00ff00;
font-family:Consolas,monospace;
}

body.irc .send-btn{
background:#001100;
color:#00ff00;
border:1px solid #00ff00;
}

body.irc .name-bar{
background:#000;
border:1px solid #00ff00;
}

body.irc #savedName{
color:#00ff00;
}

body.irc .edit-btn{
background:#001100;
color:#00ff00;
border:1px solid #00ff00;
}

/* MOBILE */

@media(max-width:800px){

body{
overflow-x:hidden;
flex-direction:column;
}

.sidebar{
display:flex;
width:100%;
max-height:180px;
border-right:none;
border-bottom:1px solid #333;
}

.chat-list{
padding:8px;
overflow-y:auto;
}

.chat-item{
padding:10px;
}

#onlineBox{
margin-top:10px;
padding:10px;
max-height:90px;
overflow-y:auto;
}

#onlineUsers{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.onlineUser{
font-size:12px;
padding:5px 8px;
white-space:nowrap;
}

.chat-area{
width:100%;
height:100dvh;
}

.header{
font-size:20px;
padding-top:60px;
padding-bottom:14px;
padding-left:20px;
padding-right:20px;
}

.back-btn{
left:10px;
top:10px;
padding:8px 10px;
font-size:12px;
}

.skin-bar{
flex-wrap:wrap;
}

.skin-btn{
font-size:13px;
padding:8px 12px;
}

#messages{
padding:12px;
padding-bottom:120px;
gap:10px;
}

.msg{
max-width:88%;
font-size:15px;
padding:12px;
}

.name-bar{
width:92%;
margin:auto;
margin-top:5px;
margin-bottom:5px;
}

.bottom{
padding:10px;
gap:8px;
}

#messageInput{
font-size:16px;
padding:12px;
height:52px;
}

.send-btn{
padding:12px 16px;
font-size:14px;
min-width:90px;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="sidebar-header">
Pokalbiai
</div>

<div class="chat-list">

<div class="chat-item">

<div class="chat-item-name">
FlashTaxi Global Chat
</div>

<div class="chat-item-last">
Realaus laiko pokalbiai
</div>

<div id="onlineBox">

<div id="onlineTitle">
🟢 ONLINE
</div>

<div id="onlineUsers">
Loading...
</div>

</div>

</div>

</div>

</div>

<div class="chat-area">

<div class="header">

<a href="index.html" class="back-btn">
⬅ Pagrindinis
</a>

⚡ FlashTaxi Chat

</div>

<div class="skin-bar">

<button class="skin-btn" onclick="setModern()">
☀ Modern
</button>

<button class="skin-btn" onclick="setIRC()">
💻 IRC
</button>

</div>

<div id="messages"></div>

<div class="name-bar">

<div id="savedName">
Vartotojas
</div>

<button class="edit-btn" onclick="changeName()">
✏️
</button>

</div>

<div class="bottom">

type="text"
id="messageInput"
placeholder="Rašyti žinutę..."
>

<button
class="send-btn"
onclick="sendMessage()"
>
Siųsti
</button>

</div>

</div>

<script>

/* PALIK SAVO FIREBASE CONFIG */

</script>

</body>
</html>

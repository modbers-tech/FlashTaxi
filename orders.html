<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi Užsakymas</title>

<style>

body{
    margin:0;
    padding:0;
    background:#050505;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.bg-glow{
    position:absolute;
    width:500px;
    height:500px;
    background:#00ff66;
    filter:blur(180px);
    opacity:0.08;
    border-radius:50%;
}

.order-container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:420px;
    background:rgba(15,15,15,0.95);
    border:2px solid #00ff66;
    border-radius:22px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,255,100,0.35);
    backdrop-filter:blur(10px);
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#00ff66;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#999;
    margin-bottom:25px;
    font-size:14px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input,
.input-box textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#111;
    color:white;
    font-size:15px;
    outline:none;
    border:1px solid #222;
    box-sizing:border-box;
    transition:0.3s;
}

.input-box input:focus,
.input-box textarea:focus{
    border:1px solid #00ff66;
    box-shadow:0 0 12px rgba(0,255,100,0.4);
}

textarea{
    resize:none;
    height:90px;
}

.send-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:#00ff66;
    color:black;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.send-btn:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(0,255,100,0.6);
}

.back-btn{
    margin-top:14px;
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    background:#1a1a1a;
    color:#00ff66;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#222;
}

.success{
    display:none;
    text-align:center;
    margin-top:18px;
    color:#00ff66;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="order-container">

    <div class="logo">🚕 FlashTaxi</div>
    <div class="subtitle">
        Taxi užsakymo forma
    </div>

    <div class="input-box">
        <input type="text" placeholder="Jūsų vardas">
    </div>

    <div class="input-box">
        <input type="text" placeholder="Paėmimo vieta">
    </div>

    <div class="input-box">
        <input type="text" placeholder="Kur važiuoti">
    </div>

    <div class="input-box">
        <input type="tel" placeholder="Telefono numeris">
    </div>

    <div class="input-box">
        <textarea placeholder="Papildoma informacija"></textarea>
    </div>

    <button class="send-btn" onclick="sendOrder()">
        SIŲSTI UŽSAKYMĄ
    </button>

    <button class="back-btn" onclick="history.back()">
        ← Grįžti į Chat
    </button>

    <div class="success" id="successText">
        ✅ Užsakymas išsiųstas
    </div>

</div>

<script>

function sendOrder(){

    document.getElementById("successText").style.display = "block";

}

</script>

</body>
</html>

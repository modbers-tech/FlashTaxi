<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:30px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

button{
width:260px;
padding:18px;
margin:10px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.call{
background:#00c853;
color:white;
}

.sms{
background:#2962ff;
color:white;
}

.map{
background:#aa00ff;
color:white;
}

#clock{
font-size:32px;
margin-bottom:25px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>⚡ FlashTaxi</h1>

<div id="clock"></div>

<button class="call" onclick="callTaxi()">📞 SKAMBINTI TAKSI</button>

<button class="sms" onclick="smsTaxi()">💬 SIŲSTI SMS TAKSI</button>

<button class="map" onclick="openMap()">🗺 MANO VIETA</button>

<script>

const number="+37063416430";

function callTaxi(){
window.location.href="tel:"+number;
}

function smsTaxi(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let message="Sveiki, reikia FlashTaxi. Mano vieta: https://maps.google.com/?q="+lat+","+lon;

window.location.href="sms:"+number+"?body="+encodeURIComponent(message);

}, function(){

let message="Sveiki, reikia FlashTaxi.";
window.location.href="sms:"+number+"?body="+encodeURIComponent(message);

});

}else{

let message="Sveiki, reikia FlashTaxi.";
window.location.href="sms:"+number+"?body="+encodeURIComponent(message);

}

}

function openMap(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

window.open("https://maps.google.com/?q="+lat+","+lon);

});

}

}

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');
const s=String(now.getSeconds()).padStart(2,'0');

document.getElementById("clock").innerHTML=h+":"+m+":"+s;

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>

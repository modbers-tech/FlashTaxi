<!DOCTYPE html>

<html lang="lt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.wrapper{
width:100%;
max-width:420px;
text-align:center;
padding:30px;
}

h1{
font-size:40px;
margin-bottom:25px;
}

button{
width:100%;
padding:18px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.call{
background:#00c853;
color:white;
}

.sms{
background:#2962ff;
color:white;
}

.map{
background:#aa00ff;
color:white;
}

.install{
background:#ff9800;
color:white;
}

/* taxi laikrodzio remelis */

#clock{
font-size:32px;
margin-top:30px;
font-weight:bold;
display:inline-block;
padding:12px 25px;
background:#111;
border-radius:8px;

border:4px solid transparent;

border-image: repeating-linear-gradient(
45deg,
#ffd600 0px,
#ffd600 10px,
#000 10px,
#000 20px
) 4;
}

</style>

</head>

<body>

<div class="wrapper">

<h1>⚡ FlashTaxi</h1>

<button class="call" onclick="callTaxi()">📞 SKAMBINTI TAKSI</button>

<button class="sms" onclick="smsTaxi()">💬 SIŲSTI SMS TAKSI</button>

<button class="map" onclick="openMap()">🗺 MANO VIETA</button>

<button id="installBtn" class="install" style="display:none;">
📲 Įsidiegti FlashTaxi
</button>

<div id="clock"></div>

</div>

<script>

const number="+37063416430";

function callTaxi(){
window.location.href="tel:"+number;
}

function smsTaxi(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let message="Sveiki, reikia FlashTaxi. Mano vieta: https://maps.google.com/?q="+lat+","+lon;

window.location.href="sms:"+number+"?body="+encodeURIComponent(message);

}, function(){

let message="Sveiki, reikia FlashTaxi.";
window.location.href="sms:"+number+"?body="+encodeURIComponent(message);

});

}else{

let message="Sveiki, reikia FlashTaxi.";
window.location.href="sms:"+number+"?body="+encodeURIComponent(message);

}

}

function openMap(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

window.open("https://maps.google.com/?q="+lat+","+lon);

});

}

}

/* laikrodis */

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');
const s=String(now.getSeconds()).padStart(2,'0');

document.getElementById("clock").innerHTML=h+":"+m+":"+s;

}

setInterval(updateClock,1000);
updateClock();

/* install mygtukas */

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {

e.preventDefault();

deferredPrompt = e;

document.getElementById("installBtn").style.display = "block";

});

document.getElementById("installBtn").addEventListener("click", async () => {

deferredPrompt.prompt();

const { outcome } = await deferredPrompt.userChoice;

deferredPrompt = null;

});

</script>

</body>
</html>

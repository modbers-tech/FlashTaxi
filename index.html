<script>

/* ========================= */
/* NUMBER */
/* ========================= */

const number =
"+37063416430";

/* ========================= */
/* CALL */
/* ========================= */

function callTaxi(){

window.location.href =
"tel:"+number;

}

/* ========================= */
/* SMS */
/* ========================= */

function smsTaxi(){

if(!navigator.geolocation){

let message =
"Sveiki, reikia FlashTaxi.";

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

return;

}

navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lon =
position.coords.longitude;

let message =
"Sveiki, reikia FlashTaxi. Mano vieta: https://www.google.com/maps?q="
+lat+","+lon;

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

},

function(error){

let message =
"Sveiki, reikia FlashTaxi.";

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}

/* ========================= */
/* MAP */
/* ========================= */

function openMap(){

if(!navigator.geolocation){

alert("Telefonas nepalaiko GPS");
return;

}

navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lon =
position.coords.longitude;

window.location.href =
"https://www.google.com/maps?q="
+lat+","+lon;

},

function(error){

alert(
"Nepavyko gauti vietos. Įjunkite GPS leidimus."
);

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}

/* ========================= */
/* CLOCK */
/* ========================= */

function updateClock(){

const now =
new Date();

const h =
String(now.getHours())
.padStart(2,'0');

const m =
String(now.getMinutes())
.padStart(2,'0');

const s =
String(now.getSeconds())
.padStart(2,'0');

document.getElementById(
"clock"
).innerHTML =
h+":"+m+":"+s;

}

setInterval(
updateClock,
1000
);

updateClock();

/* ========================= */
/* INSTALL APP */
/* ========================= */

let deferredPrompt;

window.addEventListener(

"beforeinstallprompt",

(e)=>{

e.preventDefault();

deferredPrompt = e;

document.getElementById(
"installBtn"
).style.display = "block";

}

);

document.getElementById(
"installBtn"
).addEventListener(

"click",

async()=>{

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

}

);

</script>

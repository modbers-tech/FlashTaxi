<!DOCTYPE html>
<html lang="lt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.wrapper{
width:100%;
max-width:420px;
text-align:center;
padding:30px;
}

h1{
font-size:42px;
margin-bottom:30px;
}

/* MYGTUKAI */

.btn{
display:block;

width:100%;

padding:18px;

margin:12px 0;

border:none;
border-radius:16px;

font-size:18px;
font-weight:bold;

cursor:pointer;

text-decoration:none;

transition:0.2s;
}

.btn:hover{
transform:scale(1.02);
opacity:0.95;
}

.call{
background:#00c853;
color:white;
}

.sms{
background:#2962ff;
color:white;
}

.map{
background:#aa00ff;
color:white;
}

.install{
background:#ff9800;
color:white;
}

.chat{
background:#ffd000;
color:black;
}

/* LAIKRODIS */

#clock{
font-size:32px;
margin-top:30px;
font-weight:bold;
display:inline-block;
padding:12px 25px;
background:#111;
border-radius:8px;

border:4px solid transparent;

border-image: repeating-linear-gradient(
45deg,
#ffd600 0px,
#ffd600 10px,
#000 10px,
#000 20px
) 4;
}

/* MOBILE */

@media(max-width:600px){

.wrapper{
padding:20px;
}

h1{
font-size:36px;
}

.btn{
font-size:16px;
padding:16px;
}

#clock{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<h1>⚡ FlashTaxi</h1>

<button class="btn call" onclick="callTaxi()">
📞 SKAMBINTI TAKSI
</button>

<button class="btn sms" onclick="smsTaxi()">
💬 SIŲSTI SMS TAKSI
</button>

<button class="btn map" onclick="openMap()">
🗺 MANO VIETA
</button>

<a href="chat.html" class="btn chat">
💬 FlashTaxi Chat
</a>

<button id="installBtn" class="btn install" style="display:none;">
📲 Įsidiegti FlashTaxi
</button>

<div id="clock"></div>

</div>

<script>

const number="+37063416430";

/* SKAMBINTI */

function callTaxi(){

window.location.href="tel:"+number;

}

/* SMS */

function smsTaxi(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let message=
"Sveiki, reikia FlashTaxi. Mano vieta: https://maps.google.com/?q="
+lat+","+lon;

window.location.href=
"sms:"+number+"?body="+encodeURIComponent(message);

}, function(){

let message="Sveiki, reikia FlashTaxi.";

window.location.href=
"sms:"+number+"?body="+encodeURIComponent(message);

});

}else{

let message="Sveiki, reikia FlashTaxi.";

window.location.href=
"sms:"+number+"?body="+encodeURIComponent(message);

}

}

/* MAP */

function openMap(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

window.open(
"https://maps.google.com/?q="+lat+","+lon
);

});

}

}

/* LAIKRODIS */

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');
const s=String(now.getSeconds()).padStart(2,'0');

document.getElementById("clock").innerHTML=
h+":"+m+":"+s;

}

setInterval(updateClock,1000);

updateClock();

/* INSTALL */

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e) => {

e.preventDefault();

deferredPrompt = e;

document.getElementById(
"installBtn"
).style.display = "block";

});

document.getElementById(
"installBtn"
).addEventListener(
"click",
async () => {

deferredPrompt.prompt();

const { outcome } =
await deferredPrompt.userChoice;

deferredPrompt = null;

});

</script>

</body>
</html>

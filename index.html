<!DOCTYPE html>
<html lang="lt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00c853">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:Arial,sans-serif;

background:
linear-gradient(
rgba(0,0,0,0.82),
rgba(0,0,0,0.92)
),
url("fonas.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

overflow:hidden;

}

/* ================================ */
/* WRAPPER */
/* ================================ */

.wrapper{

width:100%;
max-width:420px;

padding:25px;

text-align:center;

backdrop-filter:blur(4px);

background:rgba(0,0,0,0.35);

border-radius:24px;

box-shadow:
0 0 30px rgba(0,0,0,0.5);

}

/* ================================ */
/* TITLE */
/* ================================ */

h1{

font-size:42px;

margin-bottom:30px;

color:#ffd000;

text-shadow:
0 0 15px rgba(255,208,0,0.35);

}

/* ================================ */
/* BUTTONS */
/* ================================ */

.btn{

display:block;

width:100%;

padding:18px;

margin:12px 0;

border:none;

border-radius:18px;

font-size:18px;
font-weight:bold;

cursor:pointer;

text-decoration:none;

transition:0.2s;

box-shadow:
0 0 15px rgba(0,0,0,0.35);

}

.btn:hover{

transform:scale(1.02);

opacity:0.96;

}

/* ================================ */
/* COLORS */
/* ================================ */

.call{
background:#00c853;
color:white;
}

.sms{
background:#2962ff;
color:white;
}

.map{
background:#aa00ff;
color:white;
}

.chat{
background:#ffd000;
color:black;
}

.support{
background:#ff5f5f;
color:white;
}

.install{
background:#ff9800;
color:white;
}

/* ================================ */
/* CLOCK */
/* ================================ */

#clock{

margin-top:30px;

font-size:30px;

font-weight:bold;

display:inline-block;

padding:12px 24px;

background:#111;

border-radius:12px;

border:4px solid transparent;

border-image:
repeating-linear-gradient(
45deg,
#ffd600 0px,
#ffd600 10px,
#000 10px,
#000 20px
) 4;

}

/* ================================ */
/* MOBILE */
/* ================================ */

@media(max-width:600px){

.wrapper{
padding:18px;
}

h1{
font-size:34px;
}

.btn{
font-size:16px;
padding:16px;
}

#clock{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<h1>
⚡ FlashTaxi
</h1>

<!-- CALL -->

<button
class="btn call"
onclick="callTaxi()"
>

📞 SKAMBINTI TAKSI

</button>

<!-- SMS -->

<button
class="btn sms"
onclick="smsTaxi()"
>

💬 SIŲSTI SMS TAKSI

</button>

<!-- MAP -->

<button
class="btn map"
onclick="openMap()"
>

🗺 MANO VIETA

</button>

<!-- CHAT -->

<a
href="chat.html"
class="btn chat"
>

💬 FlashTaxi Chat

</a>

<!-- SUPPORT -->

<a
href="https://ko-fi.com/flashtaxi"
target="_blank"
class="btn support"
>

❤️ Paremti FlashTaxi

</a>

<!-- INSTALL -->

<button
id="installBtn"
class="btn install"
style="display:none;"
>

📲 Įsidiegti FlashTaxi

</button>

<!-- CLOCK -->

<div id="clock"></div>

</div>

<script>

/* ================================ */
/* SETTINGS */
/* ================================ */

const number =
"+37063416430";

/* ================================ */
/* CALL */
/* ================================ */

function callTaxi(){

window.location.href =
"tel:"+number;

}

/* ================================ */
/* SMS */
/* ================================ */

function smsTaxi(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lon =
position.coords.longitude;

let message =
"Sveiki, reikia FlashTaxi. Mano vieta: https://maps.google.com/?q="
+lat+","+lon;

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

},

function(){

let message =
"Sveiki, reikia FlashTaxi.";

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

}

);

}else{

let message =
"Sveiki, reikia FlashTaxi.";

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

}

}

/* ================================ */
/* MAP */
/* ================================ */

function openMap(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lon =
position.coords.longitude;

window.open(
"https://maps.google.com/?q="
+lat+","+lon
);

}

);

}

}

/* ================================ */
/* CLOCK */
/* ================================ */

function updateClock(){

const now =
new Date();

const h =
String(now.getHours())
.padStart(2,'0');

const m =
String(now.getMinutes())
.padStart(2,'0');

const s =
String(now.getSeconds())
.padStart(2,'0');

document.getElementById(
"clock"
).innerHTML =
h+":"+m+":"+s;

}

setInterval(
updateClock,
1000
);

updateClock();

/* ================================ */
/* INSTALL APP */
/* ================================ */

let deferredPrompt;

window.addEventListener(

"beforeinstallprompt",

(e) => {

e.preventDefault();

deferredPrompt = e;

document.getElementById(
"installBtn"
).style.display = "block";

}

);

document.getElementById(
"installBtn"
).addEventListener(

"click",

async () => {

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

}

);

</script>

</body>
</html>

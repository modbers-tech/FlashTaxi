<!DOCTYPE html>
<html lang="lt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashTaxi</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00c853">

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body{

font-family:Arial,sans-serif;

background:
linear-gradient(
rgba(0,0,0,0.78),
rgba(0,0,0,0.92)
),
url("fonas.png");

background-size:cover;
background-position:center center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow-x:hidden;
overflow-y:auto;

}

/* ========================= */
/* WRAPPER */
/* ========================= */

.wrapper{

width:100%;
max-width:460px;

padding:25px;

text-align:center;

background:rgba(0,0,0,0.35);

backdrop-filter:blur(6px);

border-radius:28px;

box-shadow:
0 0 35px rgba(0,0,0,0.55);

animation:fade 1s ease;

}

/* ========================= */
/* TITLE */
/* ========================= */

h1{

font-size:46px;

margin-bottom:28px;

color:#ffd000;

text-shadow:
0 0 18px rgba(255,208,0,0.5);

}

/* ========================= */
/* BUTTONS */
/* ========================= */

.btn{

display:block;

width:100%;

padding:18px;

margin:14px 0;

border:none;

border-radius:22px;

font-size:19px;
font-weight:bold;

cursor:pointer;

text-decoration:none;

transition:0.25s;

box-shadow:
0 0 18px rgba(0,0,0,0.4);

}

.btn:hover{

transform:scale(1.03);

filter:brightness(1.08);

}

/* ========================= */
/* COLORS */
/* ========================= */

.call{
background:#00c853;
color:white;
}

.sms{
background:#2962ff;
color:white;
}

.map{
background:#aa00ff;
color:white;
}

.chat{
background:#ffd000;
color:black;
}

.support{
background:#ff5f5f;
color:white;
}

.install{
background:#ff9800;
color:white;
}

/* ========================= */
/* CLOCK */
/* ========================= */

#clock{

margin-top:28px;

display:inline-block;

padding:14px 28px;

font-size:30px;
font-weight:bold;

background:#111;

border-radius:14px;

border:4px solid transparent;

border-image:
repeating-linear-gradient(
45deg,
#ffd600 0px,
#ffd600 10px,
#000 10px,
#000 20px
) 4;

box-shadow:
0 0 25px rgba(255,214,0,0.2);

}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:600px){

.wrapper{
padding:20px;
}

h1{
font-size:36px;
}

.btn{
font-size:17px;
padding:16px;
}

#clock{
font-size:24px;
}

}

/* ========================= */
/* LANDSCAPE */
/* ========================= */

@media screen and (orientation: landscape){

body{

align-items:flex-start;

padding-top:40px;

}

.wrapper{

max-width:700px;

}

.btn{

font-size:22px;

padding:20px;

}

h1{

font-size:52px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<h1>
⚡ FlashTaxi
</h1>

<!-- CALL -->

<button
class="btn call"
onclick="callTaxi()"
>

📞 SKAMBINTI TAKSI

</button>

<!-- SMS -->

<button
class="btn sms"
onclick="smsTaxi()"
>

💬 SIŲSTI SMS TAKSI

</button>

<!-- MAP -->

<button
class="btn map"
onclick="openMap()"
>

🗺 MANO VIETA

</button>

<!-- CHAT -->

<a
href="chat.html"
class="btn chat"
>

💬 FlashTaxi Chat

</a>

<!-- SUPPORT -->

<a
href="https://ko-fi.com/flashtaxi"
target="_blank"
class="btn support"
>

❤️ Paremti FlashTaxi

</a>

<!-- INSTALL -->

<button
id="installBtn"
class="btn install"
style="display:none;"
>

📲 Įsidiegti FlashTaxi

</button>

<!-- CLOCK -->

<div id="clock"></div>

</div>

<script>

/* ========================= */
/* NUMBER */
/* ========================= */

const number =
"+37063416430";

/* ========================= */
/* CALL */
/* ========================= */

function callTaxi(){

window.location.href =
"tel:"+number;

}

/* ========================= */
/* SMS */
/* ========================= */

function smsTaxi(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lon =
position.coords.longitude;

let message =
"Sveiki, reikia FlashTaxi. Mano vieta: https://maps.google.com/?q="
+lat+","+lon;

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

},

function(){

let message =
"Sveiki, reikia FlashTaxi.";

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

}

);

}else{

let message =
"Sveiki, reikia FlashTaxi.";

window.location.href =
"sms:"+number+
"?body="+
encodeURIComponent(message);

}

}

/* ========================= */
/* MAP */
/* ========================= */

function openMap(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lon =
position.coords.longitude;

window.open(
"https://maps.google.com/?q="
+lat+","+lon
);

}

);

}

}

/* ========================= */
/* CLOCK */
/* ========================= */

function updateClock(){

const now =
new Date();

const h =
String(now.getHours())
.padStart(2,'0');

const m =
String(now.getMinutes())
.padStart(2,'0');

const s =
String(now.getSeconds())
.padStart(2,'0');

document.getElementById(
"clock"
).innerHTML =
h+":"+m+":"+s;

}

setInterval(
updateClock,
1000
);

updateClock();

/* ========================= */
/* INSTALL APP */
/* ========================= */

let deferredPrompt;

window.addEventListener(

"beforeinstallprompt",

(e)=>{

e.preventDefault();

deferredPrompt = e;

document.getElementById(
"installBtn"
).style.display = "block";

}

);

document.getElementById(
"installBtn"
).addEventListener(

"click",

async()=>{

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

}

);

</script>

</body>
</html>
